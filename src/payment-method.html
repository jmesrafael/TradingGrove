<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<title>TradingGrove | Choose Payment</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/lib/theme.js"></script>
<script src="/js/lib/supabase-client.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdnjs.cloudflare.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/fontawesome.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/solid.min.css">
<link rel="stylesheet" href="/styles/pages/payment-method.css">
</head>
<body>

<div class="bg-orb bg-orb1"></div>
<div class="bg-orb bg-orb2"></div>

<div class="page-loader" id="pageLoader">
  <div class="pl-inner">
    <div class="pl-logo">Trading<span>Grove</span></div>
    <div class="pl-spin"></div>
  </div>
</div>

<header>
  <a href="/subscription" class="logo">Trading<span>Grove</span></a>
  <button class="btn-ghost" onclick="location.href='/subscription'">
    <i class="fa-solid fa-chevron-left"></i> Back to Plans
  </button>
</header>

<main>

  <div class="pm-wrap">

    <!-- Top label -->
    <div class="pm-eyebrow"><i class="fa-solid fa-lock"></i> Secure Checkout</div>

    <!-- Title -->
    <h1 class="pm-title">Choose your payment method</h1>

    <!-- Plan summary badge -->
    <div class="pm-plan-badge" id="planBadge">
      <i class="fa-solid fa-star"></i>
      <span id="planBadgeText">TradingGrove Pro — Monthly · $15/mo</span>
    </div>

    <!-- Cards -->
    <div class="pm-cards">

      <!-- Stripe -->
      <button class="pm-card" id="stripeBtn" onclick="payWithStripe()">
        <div class="pm-card-inner">
          <div class="pm-card-icon">
            <svg viewBox="0 0 60 25" fill="none" xmlns="http://www.w3.org/2000/svg" class="stripe-logo">
              <path d="M59.64 14.28h-8.06c.19 1.93 1.6 2.55 3.2 2.55 1.64 0 2.96-.37 4.05-.95v3.32a14.13 14.13 0 0 1-4.84.85c-4.3 0-7.09-2.76-7.09-7.26 0-4.06 2.28-7.38 6.6-7.38 4.17 0 6.11 3.4 6.11 7.33 0 .31-.02.71-.02 1.54h.05zm-5.29-5.71c-1.16 0-1.9.82-2.08 2.25h4.08c-.06-1.28-.6-2.25-2-2.25zM47.28 5.43V.77l4.43-.96v19.45h-4.43v-1.68c-.83 1.15-2.02 2.04-3.96 2.04-3.46 0-5.97-2.84-5.97-7.2 0-4.2 2.48-7.4 6.13-7.4 1.93 0 3.04.79 3.8 1.93V5.43zm0 9.21V11c-.48-1.02-1.38-1.73-2.5-1.73-1.68 0-2.65 1.43-2.65 3.46 0 1.97.97 3.43 2.65 3.43 1.13 0 2.03-.7 2.5-1.52zM34.3 5.43L30 19.26h-4.82L20.9 5.43H26l2.14 8.3 2.14-8.3h4.02zM16.38 2.54c0 1.4-1.1 2.52-2.52 2.52S11.34 3.94 11.34 2.54C11.34 1.14 12.44 0 13.86 0s2.52 1.14 2.52 2.54zm-4.73 2.89h4.44V19.26h-4.44V5.43zM0 19.26h4.43V5.43H0v13.83zM0 3.6a2.24 2.24 0 1 1 4.48 0A2.24 2.24 0 0 1 0 3.6z" fill="currentColor"/>
            </svg>
          </div>
          <div class="pm-card-body">
            <div class="pm-card-title">Credit or Debit Card</div>
            <div class="pm-card-desc">Visa, Mastercard, Amex &amp; more — via Stripe</div>
            <div class="pm-card-logos">
              <span class="card-logo">VISA</span>
              <span class="card-logo">MC</span>
              <span class="card-logo">AMEX</span>
            </div>
          </div>
          <div class="pm-card-arrow"><i class="fa-solid fa-chevron-right"></i></div>
        </div>
        <div class="pm-card-loader" id="stripeLoader" style="display:none">
          <i class="fa-solid fa-spinner fa-spin"></i> Redirecting to Stripe…
        </div>
      </button>

      <!-- PayPal -->
      <button class="pm-card paypal" id="paypalBtn" onclick="payWithPayPal()">
        <div class="pm-card-inner">
          <div class="pm-card-icon paypal">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="paypal-logo">
              <path d="M19.554 6.253c.22-1.4-.002-2.352-.758-3.215C17.985 2.08 16.517 1.5 14.643 1.5H8.925a.963.963 0 0 0-.953.815L5.61 18.316a.578.578 0 0 0 .57.671h4.157l-.289 1.83a.505.505 0 0 0 .499.585h3.497a.843.843 0 0 0 .833-.714l.034-.177.66-4.182.042-.23a.843.843 0 0 1 .833-.713h.525c3.398 0 6.059-1.38 6.837-5.374.325-1.666.157-3.057-.702-4.032a3.34 3.34 0 0 0-.952-.727z" fill="#009CDE"/>
              <path d="M19.554 6.253c.22-1.4-.002-2.352-.758-3.215C17.985 2.08 16.517 1.5 14.643 1.5H8.925a.963.963 0 0 0-.953.815L5.61 18.316a.578.578 0 0 0 .57.671h4.157l1.044-6.625-.032.205a.963.963 0 0 1 .952-.815h1.983c3.9 0 6.953-1.584 7.847-6.165a7.27 7.27 0 0 0-.157-.657c-.27-.118-.546-.222-.83-.295l-.009-.028c-.228-.08-.464-.147-.707-.199a8.4 8.4 0 0 0-.874-.155z" fill="#012169"/>
            </svg>
          </div>
          <div class="pm-card-body">
            <div class="pm-card-title">PayPal</div>
            <div class="pm-card-desc">Pay with your PayPal balance or linked card</div>
            <div class="pm-card-logos">
              <span class="card-logo pp">PayPal</span>
            </div>
          </div>
          <div class="pm-card-arrow"><i class="fa-solid fa-chevron-right"></i></div>
        </div>
        <div class="pm-card-loader" id="paypalLoader" style="display:none">
          <i class="fa-solid fa-spinner fa-spin"></i> Redirecting to PayPal…
        </div>
      </button>

    </div>

    <!-- Trust line -->
    <div class="pm-trust">
      <span><i class="fa-solid fa-lock"></i> 256-bit SSL encryption</span>
      <span class="pm-trust-sep">·</span>
      <span><i class="fa-solid fa-ban"></i> Cancel anytime</span>
      <span class="pm-trust-sep">·</span>
      <span><i class="fa-solid fa-database"></i> Your data is always yours</span>
    </div>

  </div>

</main>

<div id="toast"><i id="toastIcon"></i><span id="toastMsg"></span></div>

<script src="/js/modules/payment-method.js"></script>
</body>
</html>
